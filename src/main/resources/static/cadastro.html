<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockControl – Criar conta</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #181c27;
      --border:   #2a2f40;
      --accent:   #4f6ef7;
      --accent-h: #6b85ff;
      --text:     #e8eaf0;
      --muted:    #7a8099;
      --error:    #f25c5c;
      --success:  #3ecf8e;
      --radius:   12px;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%; max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      box-shadow: 0 32px 80px rgba(0,0,0,.45);
    }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted);
      cursor: pointer; margin-bottom: 32px;
      text-decoration: none;
      transition: color .2s;
    }
    .back-link:hover { color: var(--text); }

    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .brand-icon {
      width: 36px; height: 36px; background: var(--accent);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .brand-name { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; }

    h1 { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: var(--muted); margin-bottom: 32px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 16px;
      font-size: 14px; color: var(--text);
      font-family: 'Inter', sans-serif;
      outline: none; transition: border-color .2s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    .strength-bar {
      height: 4px; border-radius: 2px;
      background: var(--border);
      margin-top: 8px; overflow: hidden;
    }
    .strength-fill {
      height: 100%; border-radius: 2px;
      width: 0%; transition: width .3s, background .3s;
    }
    .strength-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .btn {
      width: 100%; padding: 14px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      font-size: 14px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background .2s, transform .1s;
      margin-top: 8px;
    }
    .btn:hover { background: var(--accent-h); }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .msg {
      margin-top: 14px; padding: 12px 14px;
      border-radius: 8px; font-size: 13px; display: none;
    }
    .msg.error   { background: rgba(242,92,92,.12); color: var(--error); border: 1px solid rgba(242,92,92,.3); display: block; }
    .msg.success { background: rgba(62,207,142,.12); color: var(--success); border: 1px solid rgba(62,207,142,.3); display: block; }

    .login-link { text-align: center; font-size: 13px; color: var(--muted); margin-top: 20px; }
    .login-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .login-link a:hover { color: var(--accent-h); }
  </style>
</head>
<body>

<div class="card">
  <a class="back-link" href="index.html">← Voltar ao login</a>

  <div class="brand">
    <div class="brand-icon">📦</div>
    <span class="brand-name">StockControl</span>
  </div>

  <h1>Criar conta</h1>
  <p class="subtitle">Preencha os dados para se cadastrar</p>

  <div class="form-group">
    <label for="login">Login</label>
    <input type="text" id="login" placeholder="escolha um nome de usuário" autocomplete="username"/>
  </div>

  <div class="form-group">
    <label for="senha">Senha</label>
    <input type="password" id="senha" placeholder="mínimo 6 caracteres" autocomplete="new-password" oninput="avaliarSenha(this.value)"/>
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-label" id="strengthLabel"></div>
  </div>

  <div class="form-group">
    <label for="confirmSenha">Confirmar senha</label>
    <input type="password" id="confirmSenha" placeholder="repita a senha" autocomplete="new-password"/>
  </div>

  <button class="btn" id="btnCadastro" onclick="cadastrar()">Criar conta</button>

  <div id="msg" class="msg"></div>

  <div class="login-link">Já tem uma conta? <a href="index.html">Entrar</a></div>
</div>

<script>
  function avaliarSenha(valor) {
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    let score = 0;
    if (valor.length >= 6)  score++;
    if (valor.length >= 10) score++;
    if (/[A-Z]/.test(valor)) score++;
    if (/[0-9]/.test(valor)) score++;
    if (/[^A-Za-z0-9]/.test(valor)) score++;

    const niveis = [
      { pct: '0%',   cor: 'transparent', txt: '' },
      { pct: '25%',  cor: '#f25c5c',     txt: 'Fraca' },
      { pct: '50%',  cor: '#f2a25c',     txt: 'Razoável' },
      { pct: '75%',  cor: '#f2df5c',     txt: 'Boa' },
      { pct: '100%', cor: '#3ecf8e',     txt: 'Forte' },
    ];
    const n = niveis[Math.min(score, 4)];
    fill.style.width      = n.pct;
    fill.style.background = n.cor;
    label.textContent     = n.txt;
    label.style.color     = n.cor;
  }

  async function cadastrar() {
    const login       = document.getElementById('login').value.trim();
    const senha       = document.getElementById('senha').value;
    const confirmSenha = document.getElementById('confirmSenha').value;
    const msg         = document.getElementById('msg');
    const btn         = document.getElementById('btnCadastro');

    msg.className = 'msg';
    msg.textContent = '';

    if (!login || !senha || !confirmSenha) {
      msg.className = 'msg error';
      msg.textContent = 'Preencha todos os campos.';
      return;
    }
    if (login.length < 3) {
      msg.className = 'msg error';
      msg.textContent = 'O login deve ter no mínimo 3 caracteres.';
      return;
    }
    if (senha.length < 6) {
      msg.className = 'msg error';
      msg.textContent = 'A senha deve ter no mínimo 6 caracteres.';
      return;
    }
    if (senha !== confirmSenha) {
      msg.className = 'msg error';
      msg.textContent = 'As senhas não coincidem.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Criando conta...';

    try {
      const res = await fetch('/auth/cadastro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login, senha })
      });

      if (res.ok) {
        msg.className = 'msg success';
        msg.textContent = 'Conta criada com sucesso! Redirecionando...';
        setTimeout(() => window.location.href = 'index.html', 1800);
      } else {
        const err = await res.text();
        msg.className = 'msg error';
        msg.textContent = err || 'Erro ao criar conta.';
      }
    } catch (e) {
      msg.className = 'msg error';
      msg.textContent = 'Erro ao conectar ao servidor.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Criar conta';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') cadastrar(); });
</script>
</body>
</html>
